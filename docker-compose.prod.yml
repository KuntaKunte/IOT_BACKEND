version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    restart: "no"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: iot
      POSTGRES_PASSWORD: iotpass
      POSTGRES_DB: iotdb
    ports:
      - "5432:5432"
    restart: "no"
    volumes:
      - pgdata:/var/lib/postgresql/data:rw
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot -d iotdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  node-ingestion:
    build: .
    command: ["node", "ingestion.js"]
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - .env
    restart: "no"

  node-api:
    build: .
    command: ["node", "api.js"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: "no"

volumes:
  pgdata:
